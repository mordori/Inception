[www]

# The user and group under which the pool will run for security
user = nobody
group = nobody

# Listen on port 9000 instead of a local socket
listen = 0.0.0.0:9000

# Process manager settings (determines how many PHP requests can be handled at once)
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

# Forward environment variables to PHP scripts
clear_env = no

# Sets memory limit for PHP-FPM processes
php_admin_value[memory_limit] = 512M
